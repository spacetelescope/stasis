name: CMake on multiple platforms

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [RelWithDebInfo]
        c_compiler: [gcc, clang]
        include:
          - os: macos-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: gcc
          - os: ubuntu-latest
            c_compiler: clang
        exclude:
          - os: macos-latest
            c_compiler: gcc

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Update apt
      if: matrix.os == 'ubuntu-latest'
      run: >
        sudo apt update

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-latest'
      run: >
        sudo apt install -y
        libcurl4-openssl-dev
        libxml2-dev
        libxml2-utils
        libzip-dev
        pandoc
        rsync

    - name: Install macOS dependencies
      if: matrix.os == 'macos-latest'
      run: >
        brew install
        libzip

    - name: Configure CMake
      run: |
        maybe_asan=""
        if [[ "${RUNNER_OS}" == "Linux" ]]; then
            maybe_asan="-DASAN=ON"
        fi
        cmake -B ${{ steps.strings.outputs.build-output-dir }} \
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
        ${maybe_asan} \
        -DTESTS=ON \
        -DTESTS_VERBOSE=ON \
        -DTESTS_RT=ON \
        -DDEBUG_MESSAGES=ON \
        -S ${{ github.workspace }}

    - name: Build
      env:
        PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure --output-junit results.xml --test-output-size-passed 65536 --test-output-size-failed 65536
      env:
        STASIS_SYSCONFDIR: ../../..
        ASAN_OPTIONS: "verify_asan_link_order=0 strict_string_checks=1 detect_stack_use_after_return=1 detect_leaks=1"
